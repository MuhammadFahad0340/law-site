<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - M&H Advocates</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-container">
      <h2>Reset Your Password</h2>
      <form onsubmit="handlePasswordReset(event)">
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
        />
        <button type="submit">Send Reset Link</button>
      </form>
      <p class="switch-link">Back to <a href="login.html">Login</a></p>
    </div>

    <!-- Snackbar -->
    <div id="snackbar">Success!</div>
    <div id="loader" style="display: none"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
      import {
        getAuth,
        sendPasswordResetEmail
      } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCDcHEvIB3pbgrQNZZJIKAfLzJ2mgDoBTU",
        authDomain: "lawfirmauth-16bd4.firebaseapp.com",
        projectId: "lawfirmauth-16bd4",
        storageBucket: "lawfirmauth-16bd4.appspot.com",
        messagingSenderId: "288192077960",
        appId: "1:288192077960:web:4bbe1be11366af56117f3d",
        measurementId: "G-7484K80JFZ"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Snackbar function
      function showSnackbar(message) {
        const sb = document.getElementById("snackbar");
        sb.textContent = message;
        sb.className = "show";
        setTimeout(() => {
          sb.className = sb.className.replace("show", "");
        }, 3000);
      }

      // Loader toggle
      function showLoader(show) {
        const loader = document.getElementById("loader");
        loader.style.display = show ? "block" : "none";
      }

      // Handle password reset
      window.handlePasswordReset = async function (event) {
        event.preventDefault();
        const email = event.target.email.value.trim();

        if (!email) return showSnackbar("Please enter your email.");

        showLoader(true);
        try {
          await sendPasswordResetEmail(auth, email);
          showLoader(false);
          showSnackbar("Password reset email sent!");
        } catch (error) {
          showLoader(false);
          let message = "Something went wrong.";
          switch (error.code) {
            case "auth/invalid-email":
              message = "Invalid email address.";
              break;
            case "auth/user-not-found":
              message = "No user found with this email.";
              break;
            default:
              message = error.message;
          }
          showSnackbar(message);
        }
      };
    </script>

    <style>
      #snackbar {
        visibility: hidden;
        min-width: 250px;
        background-color: #28a745;
        color: white;
        text-align: center;
        padding: 12px;
        position: fixed;
        z-index: 999;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%);
        border-radius: 4px;
        font-size: 16px;
      }

      #snackbar.show {
        visibility: visible;
        animation: fadein 0.5s, fadeout 0.5s 2.5s;
      }

      @keyframes fadein {
        from {
          bottom: 0;
          opacity: 0;
        }
        to {
          bottom: 30px;
          opacity: 1;
        }
      }

      @keyframes fadeout {
        from {
          bottom: 30px;
          opacity: 1;
        }
        to {
          bottom: 0;
          opacity: 0;
        }
      }

      #loader {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 1000;
        transform: translate(-50%, -50%);
        border: 6px solid #f3f3f3;
        border-top: 6px solid #333;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        100% {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }
    </style>
  </body>
</html>
