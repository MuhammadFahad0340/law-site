<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - M&H Advocates</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-container">
      <h2>Create an Account</h2>
      <form onsubmit="handleSignup(event)">
        <input type="text" name="fullname" placeholder="Full Name" required />
        <input type="email" name="email" placeholder="Email Address" required />
        <input
          type="password"
          name="password"
          placeholder="Password (min 6 characters)"
          required
          minlength="6"
        />
        <button type="submit">Sign Up</button>
      </form>
      <p class="switch-link">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>

    <!-- Snackbar -->
    <div id="snackbar">Success!</div>

    <!-- Spinner -->
    <div id="loader" style="display: none"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <!-- Auth Handler -->
    <script src="js/auth-handler.js"></script>

    <style>
      #snackbar {
        visibility: hidden;
        min-width: 250px;
        background-color: #28a745;
        color: white;
        text-align: center;
        padding: 12px;
        position: fixed;
        z-index: 999;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%);
        border-radius: 4px;
        font-size: 16px;
      }

      #snackbar.show {
        visibility: visible;
        animation: fadein 0.5s, fadeout 0.5s 2.5s;
      }

      @keyframes fadein {
        from {
          bottom: 0;
          opacity: 0;
        }
        to {
          bottom: 30px;
          opacity: 1;
        }
      }

      @keyframes fadeout {
        from {
          bottom: 30px;
          opacity: 1;
        }
        to {
          bottom: 0;
          opacity: 0;
        }
      }

      #loader {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 1000;
        transform: translate(-50%, -50%);
        border: 6px solid #f3f3f3;
        border-top: 6px solid #333;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        100% {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }
    </style>

    <script type="module">
  // Snackbar Function
  function showSnackbar(message, callbackAfter = null) {
    const sb = document.getElementById("snackbar");
    if (!sb) return;
    sb.textContent = message;
    sb.className = "show";
    setTimeout(() => {
      sb.className = sb.className.replace("show", "");
      if (callbackAfter) callbackAfter();
    }, 3000);
  }

  // Loader Function
  function showLoader(show) {
    const loader = document.getElementById("loader");
    if (loader) loader.style.display = show ? "block" : "none";
  }

  // Firebase Setup
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    sendEmailVerification,
    updateProfile,
    signOut
  } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCDcHEvIB3pbgrQNZZJIKAfLzJ2mgDoBTU",
    authDomain: "lawfirmauth-16bd4.firebaseapp.com",
    projectId: "lawfirmauth-16bd4",
    storageBucket: "lawfirmauth-16bd4.appspot.com",
    messagingSenderId: "288192077960",
    appId: "1:288192077960:web:4bbe1be11366af56117f3d",
    measurementId: "G-7484K80JFZ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Signup Handler
  window.handleSignup = async function (event) {
    event.preventDefault();
    showLoader(true);

    const name = event.target.fullname.value.trim();
    const email = event.target.email.value.trim();
    const password = event.target.password.value;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // Update display name in Firebase profile
      await updateProfile(user, {
        displayName: name
      });

      // Send email verification
      await sendEmailVerification(user);

      // Save locally
      localStorage.setItem("userName", name);

      // Force logout until verified
      await signOut(auth);

      showLoader(false);
      showSnackbar("Verification email sent. Please verify before logging in.", () => {
        window.location.href = "login.html";
      });

    } catch (error) {
      showLoader(false);
      let message = "Signup failed.";
      switch (error.code) {
        case "auth/email-already-in-use":
          message = "This email is already registered. Please log in.";
          break;
        case "auth/weak-password":
          message = "Password should be at least 6 characters.";
          break;
        case "auth/invalid-email":
          message = "Invalid email address.";
          break;
        default:
          message = "Error: " + error.message;
      }
      showSnackbar(message);
    }
  };
</script>


  </body>
</html>
